<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="760" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrow-dash" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
    <marker id="arrow-direct" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D97706"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1060" height="760" fill="#FAFAFA"/>

  <!-- Participant boxes (top) -->
  <rect x="40"  y="20" width="160" height="44" rx="4" fill="#4A90D9"/>
  <text x="120" y="47" text-anchor="middle" fill="white" font-weight="bold" font-size="13">MCP 서버</text>

  <rect x="250" y="20" width="180" height="44" rx="4" fill="#4A90D9"/>
  <text x="340" y="47" text-anchor="middle" fill="white" font-weight="bold" font-size="12">PO 오케스트레이터</text>

  <rect x="465" y="14" width="180" height="54" rx="4" fill="#6B7280"/>
  <text x="555" y="38" text-anchor="middle" fill="white" font-weight="bold" font-size="13">WAS</text>
  <text x="555" y="56" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-size="11">(User, Credit)</text>

  <rect x="660" y="14" width="180" height="54" rx="4" fill="#6B7280"/>
  <text x="750" y="38" text-anchor="middle" fill="white" font-weight="bold" font-size="13">OSS</text>
  <text x="750" y="56" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-size="11">(Management)</text>

  <rect x="850" y="14" width="170" height="54" rx="4" fill="#6B7280"/>
  <text x="935" y="38" text-anchor="middle" fill="white" font-weight="bold" font-size="13">WEB</text>
  <text x="935" y="56" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-size="11">(User)</text>

  <!-- Lifelines -->
  <line x1="120" y1="68" x2="120" y2="700" stroke="#BBB" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="340" y1="68" x2="340" y2="700" stroke="#BBB" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="555" y1="68" x2="555" y2="700" stroke="#BBB" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="750" y1="68" x2="750" y2="700" stroke="#BBB" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="935" y1="68" x2="935" y2="700" stroke="#BBB" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ── 등록 구간 ── -->

  <!-- Note: 배포 성공 -->
  <rect x="40" y="82" width="160" height="26" rx="3" fill="#FFF3CD" stroke="#FFC107" stroke-width="1"/>
  <text x="120" y="99" text-anchor="middle" fill="#856404" font-size="11">배포 성공 (CI/CD)</text>

  <!-- 1. MCP→PO: register -->
  <line x1="122" y1="130" x2="338" y2="130" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="230" y="123" text-anchor="middle" fill="#333" font-size="10">POST /api/mcp/servers/register</text>

  <!-- 2. PO→MCP: tools/list -->
  <line x1="338" y1="168" x2="122" y2="168" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="230" y="161" text-anchor="middle" fill="#333" font-size="10">POST {url}/mcp  (tools/list)</text>

  <!-- 3. MCP→PO: 도구 목록 (dashed) -->
  <line x1="122" y1="203" x2="338" y2="203" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-dash)"/>
  <text x="230" y="196" text-anchor="middle" fill="#888" font-size="10">도구 목록 응답</text>

  <!-- 4. PO→MCP: health -->
  <line x1="338" y1="240" x2="122" y2="240" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="230" y="233" text-anchor="middle" fill="#333" font-size="10">GET {url}/health</text>

  <!-- 5. MCP→PO: ok (dashed) -->
  <line x1="122" y1="275" x2="338" y2="275" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-dash)"/>
  <text x="230" y="268" text-anchor="middle" fill="#888" font-size="10">{"status": "ok"}</text>

  <!-- Note: 등록 완료 -->
  <rect x="250" y="292" width="180" height="26" rx="3" fill="#D4EDDA" stroke="#28A745" stroke-width="1"/>
  <text x="340" y="309" text-anchor="middle" fill="#155724" font-size="11">레지스트리 등록 완료</text>

  <!-- ── 구분선: 리스트 제공 ── -->
  <line x1="40" y1="336" x2="1020" y2="336" stroke="#DDD" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="530" y="350" text-anchor="middle" fill="#AAA" font-size="10">▼  리스트 제공</text>

  <!-- 6. WAS→PO -->
  <line x1="553" y1="370" x2="342" y2="370" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="448" y="363" text-anchor="middle" fill="#333" font-size="10">GET /api/mcp/servers</text>

  <!-- 7. PO→WAS (dashed) -->
  <line x1="342" y1="400" x2="553" y2="400" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-dash)"/>
  <text x="448" y="393" text-anchor="middle" fill="#888" font-size="10">서버 + 도구 목록</text>

  <!-- 8. OSS→PO -->
  <line x1="748" y1="435" x2="342" y2="435" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="545" y="428" text-anchor="middle" fill="#333" font-size="10">GET /api/mcp/servers</text>

  <!-- 9. PO→OSS (dashed) -->
  <line x1="342" y1="465" x2="748" y2="465" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-dash)"/>
  <text x="545" y="458" text-anchor="middle" fill="#888" font-size="10">서버 + 도구 목록</text>

  <!-- 10. WEB→PO -->
  <line x1="933" y1="500" x2="342" y2="500" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="637" y="493" text-anchor="middle" fill="#333" font-size="10">GET /api/mcp/servers</text>

  <!-- 11. PO→WEB (dashed) -->
  <line x1="342" y1="530" x2="933" y2="530" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-dash)"/>
  <text x="637" y="523" text-anchor="middle" fill="#888" font-size="10">서버 + 도구 목록</text>

  <!-- ── 구분선: 직접 호출 ── -->
  <line x1="40" y1="555" x2="1020" y2="555" stroke="#DDD" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="530" y="569" text-anchor="middle" fill="#AAA" font-size="10">▼  직접 호출 (오케스트레이터 미경유)</text>

  <!-- 12. WEB→MCP: direct tools/call (orange) -->
  <line x1="933" y1="592" x2="122" y2="592" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrow-direct)"/>
  <text x="527" y="585" text-anchor="middle" fill="#D97706" font-size="10">POST {url}/mcp  (tools/call)  — 직접 호출</text>

  <!-- 13. MCP→WEB: result (dashed) -->
  <line x1="122" y1="627" x2="933" y2="627" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-dash)"/>
  <text x="527" y="620" text-anchor="middle" fill="#888" font-size="10">실행 결과</text>

  <!-- Participant boxes (bottom) -->
  <rect x="40"  y="700" width="160" height="44" rx="4" fill="#4A90D9"/>
  <text x="120" y="727" text-anchor="middle" fill="white" font-weight="bold" font-size="13">MCP 서버</text>

  <rect x="250" y="700" width="180" height="44" rx="4" fill="#4A90D9"/>
  <text x="340" y="727" text-anchor="middle" fill="white" font-weight="bold" font-size="12">PO 오케스트레이터</text>

  <rect x="465" y="700" width="180" height="44" rx="4" fill="#6B7280"/>
  <text x="555" y="727" text-anchor="middle" fill="white" font-weight="bold" font-size="13">WAS</text>

  <rect x="660" y="700" width="180" height="44" rx="4" fill="#6B7280"/>
  <text x="750" y="727" text-anchor="middle" fill="white" font-weight="bold" font-size="13">OSS</text>

  <rect x="850" y="700" width="170" height="44" rx="4" fill="#6B7280"/>
  <text x="935" y="727" text-anchor="middle" fill="white" font-weight="bold" font-size="13">WEB</text>
</svg>
