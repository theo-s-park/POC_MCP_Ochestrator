<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Tools — MCP Orchestrator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#070809; --surface:#0e1015; --surface2:#13161e; --surface3:#1a1e28;
  --border:rgba(255,255,255,0.06); --border-hi:rgba(255,255,255,0.13);
  --text:#dde3ec; --muted:#5a6478; --subtle:#2a303d;
  --accent:#00e5a0; --accent-d:rgba(0,229,160,0.12);
  --blue:#4d9cff; --blue-d:rgba(77,156,255,0.12);
  --amber:#f5a623; --red:#ff5f5f;
  --sidebar-w:228px; --radius:10px;
  --font-head:'Syne',sans-serif; --font-body:'DM Sans',sans-serif; --font-mono:'JetBrains Mono',monospace;
}
body { background:var(--bg); color:var(--text); font-family:var(--font-body); font-size:14px; display:flex; min-height:100vh; }
body::before {
  content:''; position:fixed; inset:0; z-index:-1;
  background-image:radial-gradient(circle,rgba(255,255,255,0.035) 1px,transparent 1px);
  background-size:28px 28px;
}
.sidebar { width:var(--sidebar-w); min-height:100vh; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; left:0; z-index:100; }
.sidebar-logo { padding:28px 24px 24px; font-family:var(--font-head); font-size:22px; font-weight:800; letter-spacing:-.5px; }
.sidebar-logo span { color:var(--accent); }
.sidebar-divider { height:1px; background:var(--border); margin:0 16px 12px; }
.nav-section { padding:0 12px; flex:1; }
.nav-item { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:7px; text-decoration:none; color:var(--muted); font-size:13px; font-weight:500; transition:all .15s; margin-bottom:2px; }
.nav-item:hover { background:var(--surface2); color:var(--text); }
.nav-item.active { background:var(--accent-d); color:var(--accent); }
.nav-icon { width:16px; height:16px; flex-shrink:0; }
.sidebar-footer { padding:16px; border-top:1px solid var(--border); }
.token-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:6px; }
.token-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:7px 10px; color:var(--text); font-family:var(--font-mono); font-size:11px; outline:none; transition:border .15s; }
.token-input:focus { border-color:var(--accent); }
.main { margin-left:var(--sidebar-w); flex:1; padding:36px 40px; max-width:1100px; }
.page-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:32px; }
.page-title { font-family:var(--font-head); font-size:28px; font-weight:700; letter-spacing:-.5px; }
.page-subtitle { color:var(--muted); font-size:13px; margin-top:4px; }
.btn { display:inline-flex; align-items:center; gap:6px; padding:9px 18px; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; border:none; transition:all .15s; font-family:var(--font-body); }
.btn-ghost { background:transparent; color:var(--muted); border:1px solid var(--border); }
.btn-ghost:hover { border-color:var(--border-hi); color:var(--text); }
.btn-run { background:var(--blue-d); color:var(--blue); border:1px solid rgba(77,156,255,.2); padding:5px 12px; font-size:11px; }
.btn-run:hover { background:rgba(77,156,255,.2); }

/* Server group */
.server-group { margin-bottom:32px; }
.group-header { display:flex; align-items:center; gap:12px; margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid var(--border); }
.group-name { font-family:var(--font-head); font-size:17px; font-weight:700; }
.group-url { font-family:var(--font-mono); font-size:11px; color:var(--muted); }
.status-dot { width:8px; height:8px; border-radius:50%; background:var(--muted); flex-shrink:0; }
.status-dot.active { background:var(--accent); animation:pulse 2s infinite; box-shadow:0 0 0 3px var(--accent-d); }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 3px var(--accent-d)}50%{box-shadow:0 0 0 6px transparent} }

/* Tool cards */
.tools-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:12px; }
.tool-card {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  overflow:hidden; transition:border-color .2s;
}
.tool-card:hover { border-color:var(--border-hi); }
.tool-header { padding:16px 18px; display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
.tool-name { font-family:var(--font-mono); font-size:14px; font-weight:500; color:var(--accent); }
.tool-desc { font-size:12px; color:var(--muted); margin-top:4px; line-height:1.5; }
.tool-schema-toggle { cursor:pointer; font-size:11px; color:var(--muted); display:flex; align-items:center; gap:4px; white-space:nowrap; transition:color .15s; background:none; border:none; font-family:var(--font-body); }
.tool-schema-toggle:hover { color:var(--text); }
.tool-schema { border-top:1px solid var(--border); overflow:hidden; max-height:0; transition:max-height .35s; }
.tool-schema.open { max-height:500px; }
.schema-inner { padding:12px 18px; display:flex; flex-direction:column; gap:6px; }
.param-row { display:flex; flex-direction:column; gap:3px; padding:8px 10px; background:var(--surface2); border-radius:6px; border:1px solid var(--border); }
.param-top { display:flex; align-items:center; gap:6px; }
.param-name { font-family:var(--font-mono); font-size:12px; color:var(--accent); }
.param-type { font-size:10px; padding:1px 6px; border-radius:3px; background:var(--blue-d); color:var(--blue); font-family:var(--font-mono); }
.param-required { font-size:10px; padding:1px 6px; border-radius:3px; background:rgba(255,95,95,.12); color:var(--red); }
.param-desc { font-size:11px; color:var(--muted); line-height:1.4; }
.no-params { font-size:11px; color:var(--muted); padding:4px 0; }
.tool-footer { padding:10px 18px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; }

.empty-state { padding:60px 20px; text-align:center; color:var(--muted); border:1px dashed var(--border); border-radius:var(--radius); }
.empty-title { font-family:var(--font-head); font-size:16px; color:var(--text); opacity:.4; margin-bottom:6px; }
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">MCP<span>orch</span></div>
  <div class="sidebar-divider"></div>
  <nav class="nav-section">
    <a href="/" class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>Servers
    </a>
    <a href="/tools" class="nav-item active">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>Tools
    </a>
    <a href="/demo" class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>Agent Demo
    </a>
    <a href="/agent" class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><path d="M12 7v2M12 11h.01"/></svg>Agent Chat
    </a>
    <a href="/backoffice" class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>Backoffice
    </a>
  </nav>
  <div class="sidebar-footer">
    <div class="token-label">Token</div>
    <input id="globalToken" class="token-input" value="test-token-123">
  </div>
</aside>

<main class="main">
  <div class="page-header">
    <div>
      <h1 class="page-title">Tools</h1>
      <p class="page-subtitle">Available tools across all registered servers</p>
    </div>
    <button class="btn btn-ghost" onclick="load()" style="padding:7px 14px;font-size:12px">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>Refresh
    </button>
  </div>
  <div id="content"></div>
</main>

<script>
const TOKEN = () => document.getElementById('globalToken').value;

function toggleSchema(btn, id) {
  const el = document.getElementById(id);
  const open = el.classList.toggle('open');
  btn.textContent = open ? '▲ Params' : '▼ Params';
}

function renderSchema(schema) {
  if (!schema || !schema.properties) return '<div class="no-params">파라미터 없음</div>';
  const required = schema.required || [];
  return Object.entries(schema.properties).map(([key, val]) => `
    <div class="param-row">
      <div class="param-top">
        <span class="param-name">${key}</span>
        <span class="param-type">${val.type || 'any'}</span>
        ${required.includes(key) ? '<span class="param-required">required</span>' : ''}
      </div>
      ${val.description ? `<div class="param-desc">${val.description}</div>` : ''}
    </div>`).join('');
}

async function load() {
  const res = await fetch('/api/mcp/servers', { headers: { 'X-Mcp-Token': TOKEN() } });
  const { servers } = await res.json();
  const el = document.getElementById('content');
  if (!servers.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-title">No servers registered</div><div style="font-size:12px;margin-top:4px"><a href="/" style="color:var(--accent)">Register a server</a> to see its tools.</div></div>`;
    return;
  }
  el.innerHTML = servers.map(s => {
    const st = s.status.toLowerCase();
    const tools = s.tools || [];
    return `
    <div class="server-group">
      <div class="group-header">
        <div class="status-dot ${st}"></div>
        <span class="group-name">${s.name}</span>
        <span class="group-url">${s.url}</span>
        <span style="margin-left:auto;font-size:11px;color:var(--muted)">${tools.length} tool${tools.length!==1?'s':''}</span>
      </div>
      ${!tools.length
        ? '<div style="font-size:12px;color:var(--muted);padding:8px 0">No tools collected</div>'
        : `<div class="tools-grid">${tools.map((t,i) => {
            const sid = `schema-${s.id}-${i}`;
            return `
            <div class="tool-card">
              <div class="tool-header">
                <div>
                  <div class="tool-name">${t.name}</div>
                  <div class="tool-desc">${t.description||'—'}</div>
                </div>
                <button class="tool-schema-toggle" onclick="toggleSchema(this,'${sid}')">▼ Params</button>
              </div>
              <div class="tool-schema" id="${sid}">
                <div class="schema-inner">${renderSchema(t.inputSchema)}</div>
              </div>
              <div class="tool-footer">
                <a href="/demo?tool=${t.name}" class="btn btn-run">▶ Run in Demo</a>
              </div>
            </div>`;
          }).join('')}</div>`
      }
    </div>`;
  }).join('');
}
load();
</script>
</body>
</html>
